<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 王 (King) - 将棋の駒型ブロック / Shogi piece-shaped block -->
  <defs>
    <style>
      .king-body { fill: var(--block-color, #ffeb3b); }
      .king-outline { stroke: #333; stroke-width: 1.5; fill: none; }
      .king-text { fill: #c62828; font-family: serif; font-weight: bold; }
      .king-face { fill: #ffe0b2; }
      .king-eye { fill: #333; }
    </style>
  </defs>
  <!-- 将棋駒の形 / Shogi piece shape -->
  <path class="king-body" d="M32 6 L50 20 L46 58 L18 58 L14 20 Z"/>
  <path class="king-outline" d="M32 6 L50 20 L46 58 L18 58 L14 20 Z"/>
  <!-- 駒の中の文字 / Character inside piece -->
  <text class="king-text" x="32" y="30" text-anchor="middle" font-size="14">反</text>
  <text class="king-text" x="32" y="44" text-anchor="middle" font-size="14">日</text>
  <!-- 顔 (小さく上部に) / Face (small, at top) -->
  <circle class="king-eye" cx="27" cy="16" r="1.5"/>
  <circle class="king-eye" cx="37" cy="16" r="1.5"/>
  <!-- 怒り眉 / Angry eyebrows -->
  <line x1="24" y1="13" x2="29" y2="14" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="13" x2="35" y2="14" stroke="#333" stroke-width="1.5"/>
  <!-- 口 / Mouth -->
  <path d="M29 19 L32 21 L35 19" fill="none" stroke="#333" stroke-width="1"/>
</svg>
