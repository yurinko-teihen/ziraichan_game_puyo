<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 麻呂 (Maro) - 地雷型ブロック / Mine-shaped block -->
  <defs>
    <style>
      .maro-body { fill: var(--block-color, #ff4444); }
      .maro-outline { fill: #333; }
      .maro-face { fill: #ffe0b2; }
      .maro-eye { fill: #333; }
      .maro-brow { fill: #333; }
      .maro-mouth { fill: #c62828; }
      .maro-hat { fill: #1a1a1a; }
    </style>
  </defs>
  <!-- 地雷の丸い体 / Round mine body -->
  <circle class="maro-body" cx="32" cy="36" r="24"/>
  <circle class="maro-outline" cx="32" cy="36" r="24" fill="none" stroke="#333" stroke-width="2"/>
  <!-- 地雷のトゲ / Mine spikes -->
  <line x1="32" y1="8" x2="32" y2="12" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="18" x2="49" y2="21" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="36" x2="52" y2="36" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="54" x2="49" y2="51" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="60" x2="32" y2="56" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="54" x2="15" y2="51" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="8" y1="36" x2="12" y2="36" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="18" x2="15" y2="21" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- 麻呂の顔 / Maro face -->
  <circle class="maro-face" cx="32" cy="34" r="14"/>
  <!-- 麻呂眉 (太い公家眉) / Thick aristocrat eyebrows -->
  <ellipse class="maro-brow" cx="25" cy="28" rx="4" ry="2"/>
  <ellipse class="maro-brow" cx="39" cy="28" rx="4" ry="2"/>
  <!-- 目 / Eyes -->
  <circle class="maro-eye" cx="26" cy="33" r="2"/>
  <circle class="maro-eye" cx="38" cy="33" r="2"/>
  <!-- 口 / Mouth -->
  <path class="maro-mouth" d="M28 39 Q32 43 36 39" fill="none" stroke="#c62828" stroke-width="1.5"/>
  <!-- 烏帽子 / Eboshi hat -->
  <path class="maro-hat" d="M22 22 L32 4 L42 22 Z"/>
</svg>
