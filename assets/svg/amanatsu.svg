<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- あまなつ (Amanatsu) - みかん型ブロック / Orange/Mikan-shaped block -->
  <defs>
    <style>
      .mikan-body { fill: var(--block-color, #ff9800); }
      .mikan-leaf { fill: #4caf50; }
      .mikan-face { fill: #fff3e0; }
      .mikan-eye { fill: #333; }
      .mikan-mouth { fill: #e65100; }
      .mikan-line { stroke: var(--block-color-dark, #e65100); }
    </style>
  </defs>
  <!-- みかんの体 / Mikan body -->
  <ellipse class="mikan-body" cx="32" cy="38" rx="26" ry="22"/>
  <ellipse cx="32" cy="38" rx="26" ry="22" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- みかんの筋 / Mikan segments -->
  <path class="mikan-line" d="M32 16 Q28 38 32 60" fill="none" stroke-width="1" opacity="0.3"/>
  <path class="mikan-line" d="M14 24 Q32 40 50 24" fill="none" stroke-width="1" opacity="0.3"/>
  <path class="mikan-line" d="M10 42 Q32 50 54 42" fill="none" stroke-width="1" opacity="0.3"/>
  <!-- ヘタと葉っぱ / Stem and leaf -->
  <rect x="30" y="14" width="4" height="6" rx="1" fill="#795548"/>
  <ellipse class="mikan-leaf" cx="40" cy="14" rx="8" ry="4" transform="rotate(-20 40 14)"/>
  <!-- 顔 / Face -->
  <circle class="mikan-eye" cx="24" cy="36" r="2.5"/>
  <circle class="mikan-eye" cx="40" cy="36" r="2.5"/>
  <!-- にっこり目 / Happy eyes -->
  <path d="M22 34 Q24 32 26 34" fill="none" stroke="#333" stroke-width="1"/>
  <path d="M38 34 Q40 32 42 34" fill="none" stroke="#333" stroke-width="1"/>
  <!-- 口 / Mouth -->
  <path d="M26 42 Q32 48 38 42" fill="none" stroke="#e65100" stroke-width="2"/>
  <!-- ほっぺ / Cheeks -->
  <circle cx="18" cy="40" r="4" fill="#ff8a80" opacity="0.4"/>
  <circle cx="46" cy="40" r="4" fill="#ff8a80" opacity="0.4"/>
</svg>
